<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Locked App</title>

  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          frame-src https://script.google.com https://*.googleusercontent.com;
          child-src https://script.google.com https://*.googleusercontent.com;
          connect-src 'self' https://script.google.com https://*.googleusercontent.com;
          img-src 'self' data: https://script.google.com https://*.googleusercontent.com;
          style-src 'self' 'unsafe-inline';
          script-src 'self' 'unsafe-inline';
        ">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;          /* no page scroll */
      overscroll-behavior: none; /* stop pull-to-refresh where supported */
      touch-action: pan-x pan-y; /* normal touch but no weird gestures */
    }
    iframe { border:0; width:100%; height:100%; display:block; }
  </style>

  <script>
    (function () {
      // Prevent pull-to-refresh on browsers that trigger it via touch + top-of-page.
      let startY = 0;
      let maybePull = false;

      window.addEventListener('touchstart', function (e) {
        if (!e.touches || e.touches.length !== 1) return;
        startY = e.touches[0].clientY;
        // Since body is overflow:hidden, page scroll should be 0 anyway,
        // but keep it safe:
        maybePull = (window.scrollY === 0);
      }, { passive: true });

      window.addEventListener('touchmove', function (e) {
        if (!maybePull) return;
        if (!e.touches || e.touches.length !== 1) return;

        const y = e.touches[0].clientY;
        const dy = y - startY;

        // If swiping DOWN from the top, block the browser refresh gesture.
        if (dy > 0) {
          e.preventDefault();
        }
      }, { passive: false });
    })();
  </script>
</head>

<body>
  <iframe
    src="https://script.google.com/macros/s/AKfycbw8DMxFpQ2S2MDq16DP6JUMIwwRenuH5vX-Dwmi0AuyuJ2aWNZ8mHGtqxG9nxbm42YF/exec"
    sandbox="allow-forms allow-scripts allow-same-origin allow-top-navigation-by-user-activation"
    referrerpolicy="no-referrer">
  </iframe>
</body>
</html>
